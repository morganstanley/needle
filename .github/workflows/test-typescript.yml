name: Compatible Typescript Versions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        typescript-version: [5.7, 5.8, 5.9]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Use Node.js 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.x
        cache: npm
    - run: npm ci
    - run: npm install --no-save typescript@${{ matrix.typescript-version }}
    - run: npm run build
    - run: npm run test
