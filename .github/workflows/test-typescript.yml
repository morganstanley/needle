name: Compatible Typescript Versions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        typescript-version: [5.7, 5.8, 5.9]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Use Node.js 24.x
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24.x
        cache: npm
    - run: npm ci
    - run: npm install --no-save typescript@${{ matrix.typescript-version }}
    - run: npm run build
    - run: npm run test
